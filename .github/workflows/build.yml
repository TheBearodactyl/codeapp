name: Build IPA

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -workspace YourApp.xcworkspace \
            -scheme YourScheme \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ${{ github.workspace }}/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Package IPA from archive
        run: |
          mkdir -p ${{ github.workspace }}/build/Payload
          cp -r ${{ github.workspace }}/build/App.xcarchive/Products/Applications/*.app \
            ${{ github.workspace }}/build/Payload/
          cd ${{ github.workspace }}/build
          zip -r Code.ipa Payload
          rm -rf Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa-build
          path: ${{ github.workspace }}/build/Code.ipa
