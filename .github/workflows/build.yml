name: Build IPA

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Download pre-built frameworks
        run: |
          chmod +x ./downloadFrameworks.sh
          ./downloadFrameworks.sh

      - name: List available schemes (debug)
        run: xcodebuild -project Code.xcodeproj -list

      - name: Build unsigned archive
        run: |
          xcodebuild \
            -project Code.xcodeproj \
            -scheme "Code App" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ github.workspace }}/build/Code.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Package IPA
        run: |
          APP_PATH=$(find "${{ github.workspace }}/build/Code.xcarchive/Products" \
            -name "*.app" -maxdepth 3 | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in archive. Archive contents:"
            find "${{ github.workspace }}/build/Code.xcarchive" -type d
            exit 1
          fi

          echo "Found: $APP_PATH"
          mkdir -p "${{ github.workspace }}/build/Payload"
          cp -r "$APP_PATH" "${{ github.workspace }}/build/Payload/"
          cd "${{ github.workspace }}/build"
          zip -r Code.ipa Payload
          rm -rf Payload
          ls -lh Code.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Code-unsigned-${{ github.sha }}
          path: ${{ github.workspace }}/build/Code.ipa
          retention-days: 14
